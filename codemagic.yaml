workflows:
  ios-native-build:
    name: Median iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 15

    scripts:
      - name: Install CocoaPods
        script: |
          cd .
          pod install --repo-update --project-directory=.

      - name: Build App (no signing)
        script: |
          xcodebuild \
            -workspace "StockManagement.xcworkspace" \
            -scheme "StockManagement" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            # ADD THESE THREE LINES BELOW:
            ENTITLEMENTS_ALLOWED=NO \
            GenerateInfoPlistFile=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            OTHER_CFLAGS="-Wno-deprecated-declarations" \
            build

      - name: Create IPA manually
        script: |
          mkdir -p build/Payload
          cp -R build/Build/Products/Release-iphoneos/StockManagement.app build/Payload/
          cd build
          zip -r StockManagement.ipa Payload

    artifacts:
      - build/*.ipa
