workflows:
  ios-native-build:
    name: Median iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 15

    scripts:
      - name: Install CocoaPods
        script: |
          pod install --repo-update

      - name: Build App (no signing)
        script: |
          xcodebuild \
            -workspace "StockManagement.xcworkspace" \
            -scheme "StockManagement" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            OTHER_CFLAGS="-Wno-deprecated-declarations" \
            build

      - name: Create IPA manually
        script: |
          mkdir -p build/Payload
          cp -R build/Release-iphoneos/StockManagement.app build/Payload/
          cd build
          zip -r StockManagement.ipa Payload

    artifacts:
      - build/*.ipa
