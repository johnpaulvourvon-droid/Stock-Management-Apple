workflows:
  ios-native-build:
    name: Median iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 15

    scripts:
      - name: Install CocoaPods
        script: |
          # Force the use of the CDN and update the Median specs
          pod install --repo-update

      - name: Build App (Fixing Scope Error)
        script: |
          xcodebuild \
            -workspace "StockManagement.xcworkspace" \
            -scheme "StockManagement" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            OTHER_SWIFT_FLAGS="-D RELEASE" \
            OTHER_CFLAGS="-Wno-deprecated-declarations" \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Create IPA manually
        script: |
          mkdir -p build/Payload
          # Median often names the internal app folder differently than the workspace
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" -type d -maxdepth 1)
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -r StockManagement_Unsigned.ipa Payload

    artifacts:
      - build/*.ipa
