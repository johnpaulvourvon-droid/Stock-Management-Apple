      - name: Create IPA manually
        script: |
          # 1. Create the Payload folder
          mkdir -p build/Payload
          
          # 2. Find where Xcode actually put the .app file
          # We search inside the derivedDataPath we defined ('build')
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" -type d -maxdepth 1)
          
          echo "Found app at: $APP_PATH"
          
          # 3. Copy the app into the Payload folder
          cp -R "$APP_PATH" build/Payload/
          
          # 4. Zip it up
          cd build
          zip -r StockManagement_Unsigned.ipa Payload
