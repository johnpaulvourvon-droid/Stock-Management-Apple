workflows:
  ios-native-build:
    name: Median iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 15
    scripts:
      - name: Install dependencies
        script: |
          cd ios
          # Use the correct Median Specs URL
          pod repo add gonativeio-gonative-specs https://github.com/johnpaulvourvon-droid/Stock-Management-Apple.git || true
          pod install --repo-update
      - name: Build iOS App
        script: |
          cd ios
          xcodebuild build \
            -workspace "StockManagement.xcworkspace" \
            -scheme "StockManagement" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""
    artifacts:
      - ios/build/Release-iphoneos/*.app
