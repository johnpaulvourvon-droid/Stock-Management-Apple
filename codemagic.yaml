workflows:
  ios-native-build:
    name: Median iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 15

    scripts:
      - name: Install CocoaPods
        script: |
          pod install --repo-update

      - name: Build App (no signing)
        script: |
          xcodebuild \
            -workspace "StockManagement.xcworkspace" \
            -scheme "StockManagement" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            OTHER_CFLAGS="-Wno-deprecated-declarations" \
            clean build

      - name: Create IPA manually
        script: |
          # Create the required folder structure
          mkdir -p build/Payload
          
          # Median apps often have spaces or specific names. 
          # This command finds ANY .app file in the build folder and copies it.
          cp -R build/Build/Products/Release-iphoneos/*.app build/Payload/
          
          # Zip the Payload folder into an IPA
          cd build
          zip -r StockManagement_Unsigned.ipa Payload

    artifacts:
      - build/*.ipa
