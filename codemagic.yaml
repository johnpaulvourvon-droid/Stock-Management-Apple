workflows:
  ios-native-build:
    name: Median iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 15
    scripts:
      - name: Install dependencies
        script: |
          # Use the FULL URL here
          pod repo add gonativeio-gonative-specs https://github.com || true
          pod install
      - name: Build iOS App
        script: |
          xcodebuild build \
            -workspace "StockManagement.xcworkspace" \
            -scheme "StockManagement" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""
    artifacts:
      - build/Release-iphoneos/*.app
